<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Adobe Connect Downloader</title>

    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body>
    <div class="container">
      <h1>ادوبی کانکت دانلودر</h1>

      <div class="subtitle">
        لینک جلسه خود را برای تبدیل و دانلود آن وارد کنید.
      </div>

      <input id="url" placeholder="https://example.com/XXXXXXX/?session=XXXXXXXXXXXXXX&proto=true" />

      <button id="btn" onclick="convertMeeting()">تبدیل جلسه</button>

      <div id="status"></div>

      <div class="progress-wrapper" id="progressBox">
        <div class="stage">
          <span class="stage-name" id="stageName">در حال آماده‌سازی</span>
          <span class="percent" id="percent">0%</span>
        </div>

        <div class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
      </div>

      <div id="result"></div>

      <div class="history-section">
        <div class="history-title">تبدیل‌های اخیر</div>
        <div id="historyList" class="history-list">
          <!-- History items will be injected here -->
        </div>
      </div>

      <div class="footer">ساخته شده با 💜 برای او</div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
